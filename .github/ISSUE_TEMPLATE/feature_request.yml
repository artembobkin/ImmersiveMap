name: Feature request
description: Suggest an idea or improvement for ImmersiveMap
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what is missing or hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? API sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or worked around.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references to other map SDKs, screenshots, etc.
